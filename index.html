<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHF 進化武器 撃数＆狩Pシミュレーター (マグスパ・煌然想定)</title>
    <style>
        :root {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --primary: #fbbf24;
            --primary-hover: #f59e0b;
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 540px;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .sub-title {
            font-size: 13px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
        }

        .section-header {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .row:last-child {
            margin-bottom: 0;
        }

        .col {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: bold;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            appearance: none;
            -webkit-appearance: none;
        }

        select {
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239ca3af%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        .result-card {
            background: linear-gradient(145deg, #2a364a, #1f2937);
            border-top: 4px solid var(--primary);
        }

        .result-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-align: center;
        }

        .result-val {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.3);
            text-align: center;
            margin-bottom: 8px;
        }
        
        .result-shortage {
            font-size: 24px;
            font-weight: bold;
            color: var(--error);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        }

        .details-box {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .detail-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }
        .detail-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .achieved {
            color: var(--success);
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .error {
            color: var(--error);
            font-size: 16px;
            text-align: center;
        }

        .share-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .share-btn:hover {
            background-color: var(--secondary-hover);
        }

        .info-note {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
            background-color: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✦ 進化武器 撃数＆狩Pシミュレーター ✦</h1>
    <div class="sub-title">Rain鯖仕様 / マグネットスパイク・煌然想定</div>
    
    <div class="card">
        <div class="section-header"> 現在の武器</div>
        <div class="row">
            <div class="col" style="flex: 1.5;">
                <label>進化段階</label>
                <select id="currentType">
                    <option value="0">未派生 (通常進化)</option>
                    <option value="1">派生後 (煌然)</option>
                    <option value="2">G級進化 (真・煌然)</option>
                    <option value="3">辿異進化 </option>
                </select>
            </div>
            <div class="col" style="flex: 1;">
                <label>レベル</label>
                <input type="number" id="currentLv" min="1" max="100" value="1">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-header"> 目標の武器</div>
        <div class="row">
            <div class="col" style="flex: 1.5;">
                <label>進化段階</label>
                <select id="targetType">
                    <option value="0">未派生 (通常進化)</option>
                    <option value="1">派生後 (煌然)</option>
                    <option value="2">G級進化 (真・煌然)</option>
                    <option value="3" selected>辿異進化 </option>
                </select>
            </div>
            <div class="col" style="flex: 1;">
                <label>レベル</label>
                <input type="number" id="targetLv" min="1" max="100" value="100">
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label>作成本数 (1〜20本)</label>
                <input type="number" id="weaponCount" min="1" max="20" value="1">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-header"> 手持ちの資産 (任意)</div>
        <div class="row">
            <div class="col">
                <label>手持ちの天撃玉 (個)</label>
                <input type="number" id="currentTama" min="0" value="0">
            </div>
            <div class="col">
                <label>手持ちの狩煉道ポイント</label>
                <input type="number" id="currentKariP" min="0" value="0">
            </div>
        </div>
    </div>

    <div class="card result-card">
        <div class="result-title">目標達成までに必要な総撃数</div>
        <div id="resultDisplay" class="result-val">-</div>
        
        <div class="result-title">最終的な不足狩P</div>
        <div id="shortageDisplay" class="result-shortage">-</div>
        
        <div class="details-box" id="detailsBox">
            <div class="detail-row">
                <span>不足天撃玉 <span class="detail-sub" id="packInfo"></span></span>
                <span id="packKariP">0 狩P</span>
            </div>
            <div class="detail-row">
                <span>派生・生産素材の合計</span>
                <span id="materialKariP">0 狩P</span>
            </div>
            <div class="detail-row">
                <span>総必要狩P <span class="detail-sub">(所持品を引く前)</span></span>
                <span id="totalKariP">0 狩P</span>
            </div>
        </div>
        
        <button id="shareBtn" class="share-btn">📋 進行度をコピー (Discord用)</button>
    </div>

    <div class="info-note">
        ・天撃玉は「999個＝7500狩P (1個=100g/Gg換算)」の販売仕様に基づき、端数は切り上げて計算します。<br>
        ・素材交換Pはマグスパ[煌然]ルート基準です (生産:2万 / 煌然派生:2万 / 真派生:4.6万 / 極派生:5.4万 狩P)。<br>
    </div>
</div>

<script>
    const wpCost = {
        tengekiPackSize: 999,
        tengekiPackPrice: 7500,
        gekiPerTama: 100,
        materialProd: 20000,
        materialToBranch: 20000,
        materialToG: 46000,
        materialToZenith: 54000
    };

    const normalCosts = [70, 80, 90, 100, 120, 140, 160, 180, 200, 220, 240, 260, 280, 300, 320, 340, 360, 380, 400, 420, 440, 440, 460, 480, 500, 520, 540, 560, 580, 600, 620, 640, 660, 680, 700, 720, 740, 760, 780, 800, 820, 840, 860, 880, 900, 920, 940, 960, 980, 1000, 1050, 1100, 1150, 1200, 1250, 1300, 1350, 1400, 1450, 1500, 1550, 1600, 1650, 1700, 1750, 1800, 1850, 1900, 1950, 2000, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3200, 3400, 3600, 3800, 4000, 4500, 5000, 5500, 6000, 7000, 8000, 9000, 10000, 11000, 12000, 13000, 14000, 15000, 17000, 20000];
    const branchedCosts = [1000, 1050, 1100, 1150, 1200, 1250, 1300, 1350, 1400, 1450, 1500, 1550, 1600, 1650, 1700, 1750, 1800, 1850, 2000, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3100, 3200, 3300, 3400, 3500, 3600, 3700, 3800, 3900, 4000, 4200, 4400, 4600, 4800, 5000, 5200, 5400, 5600, 5800, 6000, 6500, 7000, 7500, 8000, 8500, 9000, 9500, 10000, 10500, 11000, 12000, 13000, 14000, 15000, 16000, 17000, 18000, 19000, 20000, 21000, 22000, 23000, 24000, 25000, 26000, 27000, 28000, 29000, 30000, 31000, 32000, 33000, 34000, 35000, 36000, 37000, 38000, 39000, 40000, 41000, 42000, 43000, 44000, 45000, 46000, 47000, 48000, 49000, 50000, 60000];
    const gCosts = [2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 2500, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 5000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 10000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 15000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 20000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 50000, 100000, 100000, 100000, 100000, 120000, 120000, 120000, 150000, 150000, 200000];
    const zenithCosts = [100000, 100000, 100000, 125000, 125000, 125000, 125000, 125000, 150000, 150000, 150000, 150000, 150000, 175000, 175000, 175000, 175000, 175000, 200000, 200000, 200000, 200000, 200000, 225000, 225000, 225000, 225000, 225000, 250000, 250000, 250000, 250000, 250000, 275000, 275000, 275000, 275000, 275000, 300000, 300000, 300000, 300000, 300000, 325000, 325000, 325000, 325000, 325000, 350000, 350000, 350000, 350000, 350000, 400000, 400000, 400000, 400000, 400000, 450000, 450000, 450000, 450000, 450000, 500000, 500000, 500000, 500000, 500000, 600000, 600000, 600000, 600000, 600000, 700000, 700000, 700000, 700000, 700000, 800000, 800000, 800000, 800000, 800000, 900000, 900000, 900000, 900000, 900000, 1000000, 1000000, 1000000, 1000000, 1000000, 1000000, 1000000, 1000000, 1000000, 1000000, 3000000];
    const allEras = [normalCosts, branchedCosts, gCosts, zenithCosts];
    const typeNames = ["未派生", "煌然", "真・煌然", "極"];

    const curTypeSel = document.getElementById('currentType');
    const curLvInp = document.getElementById('currentLv');
    const tarTypeSel = document.getElementById('targetType');
    const tarLvInp = document.getElementById('targetLv');
    const weaponCountInp = document.getElementById('weaponCount');
    const curTamaInp = document.getElementById('currentTama');
    const curKariPInp = document.getElementById('currentKariP');
    
    const resultDisplay = document.getElementById('resultDisplay');
    const shortageDisplay = document.getElementById('shortageDisplay');
    const detailsBox = document.getElementById('detailsBox');
    const shareBtn = document.getElementById('shareBtn');

    let currentShareText = "";

    function updateCalculations() {
        let curType = parseInt(curTypeSel.value);
        let curLv = parseInt(curLvInp.value) || 1;
        let tarType = parseInt(tarTypeSel.value);
        let tarLv = parseInt(tarLvInp.value) || 100;
        let weaponCount = parseInt(weaponCountInp.value) || 1;
        let curTama = parseInt(curTamaInp.value) || 0;
        let curKariP = parseInt(curKariPInp.value) || 0;

        if (curLv < 1) curLv = 1; if (curLv > 100) curLv = 100;
        if (tarLv < 1) tarLv = 1; if (tarLv > 100) tarLv = 100;
        if (weaponCount < 1) weaponCount = 1; if (weaponCount > 20) weaponCount = 20;
        if (curTama < 0) curTama = 0;
        if (curKariP < 0) curKariP = 0;

        if (curType > tarType || (curType === tarType && curLv > tarLv)) {
            resultDisplay.innerHTML = '<div class="error">逆行計算はできません</div>';
            shortageDisplay.innerHTML = '-';
            detailsBox.style.display = 'none';
            shareBtn.style.display = 'none';
            return;
        }

        if (curType === tarType && curLv === tarLv) {
            resultDisplay.innerHTML = '<div class="achieved">達成済み！</div>';
            shortageDisplay.innerHTML = '0 狩P';
            shortageDisplay.style.color = 'var(--success)';
            detailsBox.style.display = 'none';
            shareBtn.style.display = 'none';
            return;
        }

        detailsBox.style.display = 'block';
        shareBtn.style.display = 'block';
        shortageDisplay.style.color = 'var(--error)';

        let baseGeki = 0;
        let baseMatP = 0;
        let tempType = curType;
        let tempLv = curLv;

        if (curType === 0 && curLv === 1) baseMatP += wpCost.materialProd;

        while (tempType < tarType || tempLv < tarLv) {
            if (tempType === tarType) {
                const currentArray = allEras[tempType];
                for (let i = tempLv - 1; i < tarLv - 1; i++) {
                    baseGeki += currentArray[i];
                }
                break;
            } else {
                const currentArray = allEras[tempType];
                for (let i = tempLv - 1; i < 99; i++) {
                    baseGeki += currentArray[i];
                }
                
                if (tempType === 0) baseMatP += wpCost.materialToBranch;
                if (tempType === 1) {
                    baseMatP += wpCost.materialToG;
                    baseGeki += 1000000;
                }
                if (tempType === 2) baseMatP += wpCost.materialToZenith;

                tempType++;
                tempLv = 1;
            }
        }

        // --- 本数を乗算 ---
        let totalGeki = baseGeki * weaponCount;
        let totalMatP = baseMatP * weaponCount;

        // --- 資産を考慮した狩P計算 ---
        const tamaNeeded = Math.ceil(totalGeki / wpCost.gekiPerTama);
        const tamaShortage = Math.max(0, tamaNeeded - curTama); // 手持ちの天撃玉を消費
        const packsNeeded = Math.ceil(tamaShortage / wpCost.tengekiPackSize); // 不足分を買うパック数
        
        const tengekiKariP = packsNeeded * wpCost.tengekiPackPrice;
        const totalRequiredKariP = tengekiKariP + totalMatP; // 資産を引く前の総必要狩P
        
        const finalKariP = Math.max(0, totalRequiredKariP - curKariP); // 手持ちの狩Pを消費

        // UIの書き換え
        resultDisplay.innerText = totalGeki.toLocaleString() + ' g';
        
        if (finalKariP === 0) {
            shortageDisplay.innerText = '0 狩P (達成可能!)';
            shortageDisplay.style.color = 'var(--success)';
        } else {
            shortageDisplay.innerText = finalKariP.toLocaleString() + ' 狩P';
        }
        
        document.getElementById('packInfo').innerText = `( ${tamaShortage.toLocaleString()}個 = ${packsNeeded.toLocaleString()}セット )`;
        document.getElementById('packKariP').innerText = tengekiKariP.toLocaleString() + ' 狩P';
        document.getElementById('materialKariP').innerText = totalMatP.toLocaleString() + ' 狩P';
        document.getElementById('totalKariP').innerText = totalRequiredKariP.toLocaleString() + ' 狩P';

        // シェア用テキストの作成
        currentShareText = `【MHF 進化武器シミュ (煌然ルート)】\n作成数: ${weaponCount}本 (${typeNames[curType]} Lv${curLv} → ${typeNames[tarType]} Lv${tarLv})\n残り必要撃数: ${totalGeki.toLocaleString()} g\n不足狩P: ${finalKariP.toLocaleString()} 狩P\n`;
    }

    // シェアボタンの処理
    shareBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(currentShareText).then(() => {
            const originalText = shareBtn.innerText;
            shareBtn.innerText = '✅ コピーしました！';
            shareBtn.style.backgroundColor = 'var(--success)';
            setTimeout(() => {
                shareBtn.innerText = originalText;
                shareBtn.style.backgroundColor = 'var(--secondary)';
            }, 2000);
        }).catch(err => {
            alert('コピーに失敗しました。');
        });
    });

    curTypeSel.addEventListener('change', updateCalculations);
    curLvInp.addEventListener('input', updateCalculations);
    tarTypeSel.addEventListener('change', updateCalculations);
    tarLvInp.addEventListener('input', updateCalculations);
    weaponCountInp.addEventListener('input', updateCalculations);
    curTamaInp.addEventListener('input', updateCalculations);
    curKariPInp.addEventListener('input', updateCalculations);

    updateCalculations();
</script>

</body>
</html>
